name: Update World Cup Matches
on:
  schedule:
    - cron: '*/15 * * * *' # تشغيل السكريبت كل 15 دقيقة
  workflow_dispatch: # تسمح لك بتشغيله يدوياً وقتما تشاء

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
        run: python fetch_matches.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add matches.json
          git commit -m "تحديث تلقائي للمباريات" || exit 0
          git push
          
